quarkus.datasource.db-kind=mysql

%dev.quarkus.datasource.username=root
%dev.quarkus.datasource.password=root
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3307/flashcards?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:4200
%dev.quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=Content-Type,Accept


%prod.quarkus.datasource.username=${DB_USER:root}
%prod.quarkus.datasource.password=${DB_PASSWORD:root}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://mysql:3306/flashcards?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
%prod.quarkus.http.cors=true
%prod.quarkus.http.cors.origins=${CORS_ORIGIN:http://localhost:4200}

quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/swagger
