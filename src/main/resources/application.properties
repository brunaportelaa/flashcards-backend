# Configuraçăo do banco MySQL
quarkus.datasource.db-kind=mysql
# Referenciando variáveis de ambiente
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://localhost:3306/flashcards?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

# Configuraçăo do Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.format-sql=true

# Configuraçăo do Swagger/OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/swagger